name: mazaya
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

#--------------------- Networks & Firebase -----------------------
  dio: ^5.7.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.5.0
  pretty_dio_logger: ^1.4.0

#--------------------- Localization & Internationalization -----------------------
  intl: 0.20.2
  easy_localization: 3.0.7+1
  easy_logger: ^0.0.2
#--------------------- Tools -----------------------
  image_picker: ^1.1.2
  file_picker: ^10.3.1
  image_cropper: ^9.1.0
  flutter_html: ^3.0.0
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  dropdown_search: ^6.0.2
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.2
  flutter_offline: ^5.0.0
  pinput: ^5.0.0
  app_settings: ^6.1.1

#--------------------- State Management & Utilities -----------------------
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  get_it: ^8.0.3
  multiple_result: ^5.1.0
  injectable: ^2.5.1

#--------------------- UI & Animations -----------------------
  flutter_spinkit: ^5.1.0
  flutter_svg: ^2.1.0
  lottie: ^3.1.2
  skeletonizer: ^2.1.0+1
  flutter_animate: ^4.5.2
#--------------------- Storage & Data -----------------------
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

#--------------------- Sharing & Links -----------------------
  mobile_scanner: ^6.0.4
  share_plus: ^11.1.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  rxdart: ^0.28.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  app_links: ^6.4.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  easy_localization_loader: ^2.0.2
  flutter_gen_runner: ^5.4.0
  injectable_generator: ^2.6.2
  flutter_native_splash: ^2.4.7

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/svg/
    - assets/svg/base_svg/
    - assets/svg/app_svg/
    - assets/fonts/
    - assets/lottie/ 
    - assets/translations/

  fonts:
    - family: Madani
      fonts:
        - asset: assets/fonts/Madani Arabic Regular.ttf
          weight: 400
        - asset: assets/fonts/Madani Arabic Medium.ttf
          weight: 500
        - asset: assets/fonts/Madani Arabic Semi Bold.ttf
          weight: 600
        - asset: assets/fonts/Madani Arabic Bold.ttf
          weight: 700
        - asset: assets/fonts/Madani Arabic Extra Bold.ttf
          weight: 800
        - asset: assets/fonts/Madani Arabic Black.ttf
          weight: 900
        - asset: assets/fonts/Madani Arabic Light.ttf
          weight: 300
        - asset: assets/fonts/Madani Arabic Extra Light.ttf
          weight: 200
        - asset: assets/fonts/Madani Arabic Thin.ttf
          weight: 100

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  image: "assets/svg/app_svg/android_12_fixed.png"
  android_12:
    image: "assets/svg/app_svg/android_12_fixed.png"
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
  fullscreen: false # Better for consistent layout

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/svg/app_svg/app_launcher_icon.png"
  min_sdk_android: 21

flutter_gen:
  output: lib/src/config/res/
  line_length: 80
  integrations:
    lottie: true
    flutter_svg: true
  assets:
    enabled: true
    outputs:
      class_name: AppAssets
